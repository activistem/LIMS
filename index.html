<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIMS - LifeworkJapan情報管理システム</title>
<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #1f2937;
  --sub: #6b7280;
  --accent: #1e5f8a;
  --accent-light: #e8f1f7;
  --accent-dark: #14425f;
  --border: #e5e7eb;
  --green: #15803d;
  --amber: #b45309;
  --red: #b91c1c;
  --gray: #6b7280;
  --sidebar-w: 268px;
  --header-h: 52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
  background: var(--bg); color: var(--ink); line-height: 1.6;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* Header */
header {
  height: var(--header-h); flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  z-index: 100;
}
.h-left { display: flex; align-items: center; gap: 10px; }
.h-title { font-size: .95rem; font-weight: 700; letter-spacing: .02em; }
.h-sub { font-size: .7rem; opacity: .75; }
.h-btns { display: flex; gap: 6px; }
.h-btns button {
  background: rgba(255,255,255,.15); color: #fff;
  border: 1px solid rgba(255,255,255,.35); border-radius: 5px;
  padding: 4px 10px; cursor: pointer; font-size: .76rem;
}
.h-btns button:hover { background: rgba(255,255,255,.28); }
.hamburger {
  display: none; background: none; border: none; color: #fff;
  font-size: 1.2rem; cursor: pointer; padding: 4px 6px; line-height: 1;
}

/* Layout */
.layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: #fff; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform .22s;
}
.sidebar-scroll { flex: 1; overflow-y: auto; padding: 6px 0 16px; }

/* Tree */
.t-row {
  display: flex; align-items: center; gap: 3px;
  padding: 5px 8px 5px 0; cursor: pointer;
  border-radius: 6px; margin: 1px 6px;
  transition: background .1s; position: relative;
}
.t-row:hover { background: var(--accent-light); }
.t-row.sel { background: var(--accent-light); }
.t-row.sel .t-label { color: var(--accent); font-weight: 700; }
.t-tog {
  width: 18px; height: 18px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .6rem; color: var(--sub); border-radius: 3px;
  transition: transform .15s;
}
.t-tog:hover { background: rgba(0,0,0,.07); }
.t-tog.open { transform: rotate(90deg); }
.t-tog.leaf { opacity: 0; pointer-events: none; }
.t-icon { width: 18px; text-align: center; font-size: .85rem; flex-shrink: 0; }
.t-label { font-size: .84rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink); }
.t-count {
  font-size: .62rem; background: var(--accent-light); color: var(--accent);
  padding: 1px 5px; border-radius: 999px; font-weight: 700; flex-shrink: 0;
}
.t-acts { display: none; gap: 1px; flex-shrink: 0; }
.t-row:hover .t-acts { display: flex; }
.t-acts button {
  background: none; border: none; cursor: pointer; color: var(--sub);
  font-size: .75rem; padding: 2px 4px; border-radius: 3px; line-height: 1;
}
.t-acts button:hover { background: rgba(0,0,0,.09); color: var(--ink); }
.t-add { color: var(--accent) !important; font-weight: 700; font-size: .85rem !important; }
.t-children { margin-left: 18px; }
.t-children.collapsed { display: none; }
.t-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin: 0 5px 0 5px; }

/* Main panel */
.main-panel { flex: 1; overflow-y: auto; padding: 22px; }

.p-head {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 18px; flex-wrap: wrap;
}
.p-icon { font-size: 1.4rem; line-height: 1.2; }
.p-title { font-size: 1.15rem; font-weight: 700; color: var(--accent); }
.p-sub { font-size: .8rem; color: var(--sub); }
.p-head-right { margin-left: auto; display: flex; gap: 7px; flex-wrap: wrap; }

.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px; margin-bottom: 14px;
}
.grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.stat { text-align: center; padding: 18px 8px; }
.stat .num { font-size: 1.9rem; font-weight: 700; color: var(--accent); }
.stat .lbl { font-size: .78rem; color: var(--sub); }

label { display: block; font-size: .78rem; color: var(--sub); margin: 10px 0 3px; font-weight: 600; }
input[type=text], input[type=date], input[type=number], textarea, select {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px;
  font-size: .9rem; font-family: inherit; background: #fff;
}
textarea { min-height: 88px; resize: vertical; }
input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent-light); border-color: var(--accent); }

.btn {
  background: var(--accent); color: #fff; border: none; border-radius: 7px;
  padding: 8px 16px; cursor: pointer; font-size: .88rem;
}
.btn:hover { filter: brightness(1.12); }
.btn.sec { background: #fff; color: var(--accent); border: 1px solid var(--accent); }
.btn.del { background: #fff; color: var(--red); border: 1px solid var(--red); }
.btn.sm { padding: 4px 11px; font-size: .78rem; }
.btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

.badge {
  display: inline-block; font-size: .7rem; padding: 2px 9px;
  border-radius: 999px; font-weight: 700; white-space: nowrap;
}
.b-plan { background: #f3f4f6; color: var(--gray); }
.b-prep { background: #fef3c7; color: var(--amber); }
.b-run  { background: #dcfce7; color: var(--green); }
.b-stop { background: #fee2e2; color: var(--red); }

.meta { font-size: .76rem; color: var(--sub); }
.desc { font-size: .9rem; margin-top: 6px; white-space: pre-wrap; }

.empty { color: var(--sub); font-size: .9rem; padding: 40px; text-align: center; }
.hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

.hero {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; border-radius: 10px; padding: 18px; margin-bottom: 14px;
}
.hero .hl { font-size: .68rem; opacity: .8; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
.hero .ht { font-size: 1rem; margin-top: 3px; }

.val-row { display: flex; gap: 7px; margin-bottom: 7px; }
.val-row input { flex: 1; }

.strat-mini {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.strat-mini:last-child { border-bottom: none; }
.strat-mini:hover .sm-name { color: var(--accent); }
.sm-name { flex: 1; font-size: .88rem; }
.sm-p { font-size: .76rem; color: var(--sub); flex-shrink: 0; }

.dash-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.dash-row:last-child { border-bottom: none; }
.dash-row:hover { color: var(--accent); }

/* Relation map */

.saved-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff; padding: 7px 18px; border-radius: 999px;
  font-size: .82rem; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 1000;
}
.saved-toast.show { opacity: 1; }

@media (max-width: 640px) {
  .hamburger { display: block; }
  .sidebar {
    position: fixed; top: var(--header-h); left: 0;
    height: calc(100vh - var(--header-h)); z-index: 200;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.2); }
  .main-panel { padding: 14px; }
}
@media print {
  .sidebar, .h-btns, .hamburger, .btn { display: none !important; }
  .layout { display: block; }
  .main-panel { padding: 0; }
}

/* Customer */
.cust-table { width:100%; border-collapse:collapse; font-size:.86rem; }
.cust-table th {
  text-align:left; padding:8px 12px; font-size:.72rem; font-weight:700;
  color:var(--sub); background:var(--bg); border-bottom:2px solid var(--border);
  white-space:nowrap;
}
.cust-table td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
.cust-table tr:last-child td { border-bottom:none; }
.cust-table tbody tr { cursor:pointer; transition:background .1s; }
.cust-table tbody tr:hover { background:var(--accent-light); }
.cust-name { font-weight:600; color:var(--ink); }
.cs-badge {
  font-size: .65rem; padding: 2px 8px; border-radius: 999px; font-weight: 700; white-space: nowrap;
}
.cs-cand    { background:#f3f4f6; color:#6b7280; }
.cs-app     { background:#fef3c7; color:#b45309; }
.cs-nego    { background:#e8f1f7; color:#1e5f8a; }
.cs-done    { background:#dcfce7; color:#15803d; }
.cs-pass    { background:#fee2e2; color:#b91c1c; }

/* Flow Map */
.flow-wrap { position:relative; width:100%; height:calc(100vh - var(--header-h) - 155px); min-height:300px; overflow:hidden; background:#f8f9fb; border-radius:8px; border:1px solid var(--border); }
.flow-world { position:absolute; transform-origin:0 0; }
.fnode { position:absolute; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.12); min-width:140px; user-select:none; }
.fnode.fsel { box-shadow:0 0 0 2px var(--accent),0 2px 8px rgba(0,0,0,.12); }
.fnode-head { padding:6px 8px 5px; border-radius:8px 8px 0 0; display:flex; align-items:center; gap:5px; cursor:move; }
.fnode-lbl { font-size:.8rem; font-weight:700; color:#fff; background:transparent; border:none; outline:none; flex:1; min-width:0; cursor:move; font-family:inherit; }
.fnode-lbl:focus { cursor:text; }
.fnode-body { padding:7px 10px; font-size:.75rem; color:var(--sub); min-height:32px; outline:none; border-radius:0 0 8px 8px; }
.fport { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.75); border:2px solid rgba(255,255,255,.95); cursor:crosshair; flex-shrink:0; }
.fnode-del { color:rgba(255,255,255,.6); cursor:pointer; font-size:.7rem; padding:0 1px; flex-shrink:0; line-height:1; }
.fnode-del:hover { color:#fff; }
.fresize { position:absolute; right:3px; bottom:3px; width:10px; height:10px; cursor:se-resize; opacity:.3; font-size:.65rem; line-height:1; color:var(--sub); }
.fresize:hover { opacity:.7; }
.flow-toolbar { position:absolute; top:10px; left:10px; z-index:10; display:flex; gap:6px; }
.flow-toolbar button { background:#fff; border:1px solid var(--border); border-radius:6px; padding:5px 11px; font-size:.76rem; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.1); }
.flow-toolbar button:hover { background:var(--accent-light); border-color:var(--accent); }
.ftype-row { display:flex; gap:6px; flex-wrap:wrap; padding:0 0 10px; }
.ftype-btn { border:2px solid transparent; border-radius:999px; padding:3px 12px; font-size:.72rem; font-weight:700; cursor:pointer; opacity:.6; transition:opacity .1s; }
.ftype-btn.fta { opacity:1; border-color:currentColor; }

/* CSV modal */
.modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:500;
  display:flex; align-items:center; justify-content:center;
}
.modal {
  background:#fff; border-radius:12px; padding:24px; width:min(600px,94vw);
  max-height:85vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.2);
}
.modal h3 { font-size:1rem; font-weight:700; margin-bottom:14px; color:var(--accent); }
.csv-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.csv-grid label { font-size:.76rem; color:var(--sub); font-weight:600; margin-bottom:2px; }
.csv-grid select { width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:6px; font-size:.82rem; }
.csv-preview { font-size:.76rem; color:var(--sub); background:var(--bg); border-radius:6px; padding:8px 10px; margin-bottom:14px; overflow-x:auto; white-space:nowrap; }
</style>
</head>
<body>

<header>
  <div class="h-left">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div>
      <div class="h-title">LIMS</div>
      <div class="h-sub">LifeworkJapan情報管理システム</div>
    </div>
  </div>
  <div class="h-btns">
    <button onclick="exportData()">⬇ エクスポート</button>
    <button onclick="document.getElementById('importFile').click()">⬆ インポート</button>
    <button onclick="window.print()">印刷</button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-scroll" id="sidebarTree"></div>
  </aside>
  <main class="main-panel" id="mainPanel"></main>
</div>

<div class="saved-toast" id="toast">保存しました</div>

<script>
// ── Constants ─────────────────────────────────────────────
const dotColor = { '構想中':'#9ca3af','準備中':'#b45309','運営中':'#15803d','休止中':'#b91c1c' };
const bBadge = s => ({構想中:'b-plan',準備中:'b-prep',運営中:'b-run',休止中:'b-stop'}[s]||'b-plan');

// ── Data ──────────────────────────────────────────────────
const STORE_KEY = 'lims-data-v1';
let data = {
  philosophy: { mission:'', vision:'', values:[], story:'' },
  businesses: [], strategies: [], notes: [],
  customers: [],
  flowNodes: [], flowEdges: []
};
let sel = { type:'dashboard', id:null };
let treeOpen = { philosophy:true, businesses:true, notes:true, common:true, customers:true };

function load() {
  try {
    const r = localStorage.getItem(STORE_KEY);
    if (r) {
      const parsed = JSON.parse(r);
      data = Object.assign(data, parsed);
      if (!data.customers)    data.customers = [];
      if (!data.flowNodes)    data.flowNodes = [];
      if (!data.flowEdges)    data.flowEdges = [];
    }
  } catch(e) { console.warn(e); }
}
function persist(msg) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
  const t = document.getElementById('toast');
  t.textContent = msg || '保存しました';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
  renderTree(); renderPanel();
}
const uid   = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const linkify = t => t.replace(/(https?:\/\/[^\s<"]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);word-break:break-all">$1</a>');
const esc   = s => (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const today = () => new Date().toISOString().slice(0,10);

// ── Selection ─────────────────────────────────────────────
function go(type, id=null) {
  sel = { type, id };
  document.getElementById('sidebar').classList.remove('open');
  renderTree(); renderPanel();
}
function isSel(type, id=null) {
  if (sel.type===type && sel.id===id) return true;
  if (type==='businesses'      && sel.type==='new-business') return true;
  if (type==='business'        && sel.type==='edit-business' && sel.id===id) return true;
  if (type==='notes'           && sel.type==='new-note') return true;
  if (type==='note'            && sel.type==='edit-note' && sel.id===id) return true;
  if (type==='strategy'        && sel.type==='edit-strategy' && sel.id===id) return true;
if (type==='customers'       && sel.type==='new-customer') return true;
  if (type==='customer'        && sel.type==='edit-customer' && sel.id===id) return true;
  return false;
}

// ── Sidebar Tree ──────────────────────────────────────────
function tog(key, e) { e.stopPropagation(); treeOpen[key]=!treeOpen[key]; renderTree(); }

function renderTree() {
  let h = '';
  h += tRow('dashboard',null,'🏠','ダッシュボード',false,false,'','','');

  h += tRow('philosophy',null,'📋','理念',false,false,'');

  const bizO = treeOpen.businesses;
  h += `<div>`;
  h += tRow('businesses',null,'🏢','事業',data.businesses.length>0,bizO,`tog('businesses',event)`,data.businesses.length,`<button onclick="event.stopPropagation();newBusiness()" class="t-add" title="追加">＋</button>`);
  if(bizO){
    h+=`<div class="t-children">`;
    for(const b of data.businesses){
      const bK='biz-'+b.id, bO=treeOpen[bK]!==false;
      const bStr=data.strategies.filter(s=>s.bizId===b.id);
      const dc=dotColor[b.status]||'#9ca3af';
      h+=`<div>`;
      h+=`<div class="t-row${(isSel('business',b.id)||isSel('edit-business',b.id))?' sel':''}" onclick="go('business','${b.id}')">
        <span class="t-tog ${bStr.length>0?(bO?'open':''):'leaf'}" onclick="event.stopPropagation();tog('${bK}',event)">▶</span>
        <span class="t-dot" style="background:${dc}"></span>
        <span class="t-label">${esc(b.name)}</span>
        <div class="t-acts">
          <button onclick="event.stopPropagation();newStrategy('${b.id}')" class="t-add" title="戦略を追加">＋</button>
          <button onclick="event.stopPropagation();editBusiness('${b.id}')" title="編集">✎</button>
          <button onclick="event.stopPropagation();delBiz('${b.id}')" title="削除">✕</button>
        </div>
      </div>`;
      if(bO&&bStr.length){h+=`<div class="t-children">`;for(const s of bStr){h+=tRowStrat(s);}h+=`</div>`;}
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;

  const cStr=data.strategies.filter(s=>!s.bizId);
  const cO=treeOpen.common;
  h+=`<div>`;
  h+=tRow('common-strategies',null,'🎯','共通・全体戦略',cStr.length>0,cO,`tog('common',event)`,cStr.length||'',`<button onclick="event.stopPropagation();newStrategy('')" class="t-add" title="追加">＋</button>`);
  if(cO&&cStr.length){h+=`<div class="t-children">`;for(const s of cStr){h+=tRowStrat(s);}h+=`</div>`;}
  h+=`</div>`;

  const flowSel=isSel('flow-map')?' sel':'';
  h+=`<div class="t-row${flowSel}" onclick="go('flow-map')">
    <span class="t-tog leaf">▶</span>
    <span class="t-icon">🔀</span>
    <span class="t-label">フローマップ</span>
    ${data.flowNodes.length?`<span class="t-count">${data.flowNodes.length}</span>`:''}
  </div>`;

  const noteO=treeOpen.notes;
  h+=`<div>`;
  h+=tRow('notes',null,'📝','メモ',data.notes.length>0,noteO,`tog('notes',event)`,data.notes.length,`<button onclick="event.stopPropagation();newNote()" class="t-add" title="追加">＋</button>`);
  if(noteO){h+=`<div class="t-children">`;for(const n of data.notes){const nS=isSel('note',n.id)?' sel':'';h+=`<div class="t-row${nS}" onclick="go('note','${n.id}')"><span class="t-tog leaf">▶</span><span class="t-icon">🗒</span><span class="t-label">${esc(n.title)}</span><div class="t-acts"><button onclick="event.stopPropagation();editNote('${n.id}')" title="編集">✎</button><button onclick="event.stopPropagation();delNote('${n.id}')" title="削除">✕</button></div></div>`;}h+=`</div>`;}
  h+=`</div>`;

  const custO=treeOpen.customers;
  h+=`<div>`;
  h+=tRow('customers',null,'👥','顧客候補',data.customers.length>0,custO,`tog('customers',event)`,data.customers.length,`<button onclick="event.stopPropagation();newCustomer()" class="t-add" title="追加">＋</button>`);
  if(custO){h+=`<div class="t-children">`;for(const c of data.customers){const cS=isSel('customer',c.id)?' sel':'';h+=`<div class="t-row${cS}" onclick="go('customer','${c.id}')"><span class="t-tog leaf">▶</span><span class="t-icon">👤</span><span class="t-label">${esc(c.name)}</span><div class="t-acts"><button onclick="event.stopPropagation();editCustomer('${c.id}')" title="編集">✎</button><button onclick="event.stopPropagation();delCustomer('${c.id}')" title="削除">✕</button></div></div>`;}h+=`</div>`;}
  h+=`</div>`;

  document.getElementById('sidebarTree').innerHTML = h;
}

function tRow(type,id,icon,label,hasC,isO,togFn,count='',actHtml='') {
  const s=isSel(type,id)?' sel':'';
  const tc=hasC?(isO?'open':''):'leaf';
  return `<div class="t-row${s}" onclick="go('${type}',${id?`'${id}'`:'null'})">
    <span class="t-tog ${tc}" onclick="${togFn||'void 0'}">▶</span>
    <span class="t-icon">${icon}</span>
    <span class="t-label">${esc(label)}</span>
    ${count?`<span class="t-count">${count}</span>`:''}
    <div class="t-acts">${actHtml}</div>
  </div>`;
}
function tRowStrat(s) {
  return `<div><div class="t-row${isSel('strategy',s.id)?' sel':''}" onclick="go('strategy','${s.id}')">
    <span class="t-tog leaf">▶</span><span class="t-icon" style="font-size:.7rem">🎯</span>

// ── Panel Dispatch ────────────────────────────────────────
function renderPanel() {
  const el = document.getElementById('mainPanel');
  switch(sel.type) {
    case 'dashboard':         el.innerHTML = pDashboard(); break;
    case 'philosophy':
    case 'philosophy-sub':    el.innerHTML = pPhilosophy(); break;
    case 'businesses':        el.innerHTML = pBizList(); break;
    case 'business':          el.innerHTML = pBiz(sel.id); break;
    case 'new-business':      el.innerHTML = pEditBiz(null); break;
    case 'edit-business':     el.innerHTML = pEditBiz(sel.id); break;
    case 'common-strategies': el.innerHTML = pCommonStrats(); break;
    case 'strategy':          el.innerHTML = pStrat(sel.id); break;
    case 'new-strategy':      el.innerHTML = pEditStrat(null, sel.id); break;
    case 'edit-strategy':     el.innerHTML = pEditStrat(sel.id); break;
case 'notes':             el.innerHTML = pNoteList(); break;
    case 'note':              el.innerHTML = pNote(sel.id); break;
    case 'new-note':          el.innerHTML = pEditNote(null); break;
    case 'edit-note':         el.innerHTML = pEditNote(sel.id); break;
    case 'customers':         el.innerHTML = pCustomerList(); break;
    case 'customer':          el.innerHTML = pCustomer(sel.id); break;
    case 'new-customer':      el.innerHTML = pEditCustomer(null); break;
    case 'edit-customer':     el.innerHTML = pEditCustomer(sel.id); break;
    case 'flow-map':          el.innerHTML = pFlowMap(); setTimeout(initFlowMap,0); break;
    default:                  el.innerHTML = pDashboard();
  }
}

    <input type="text" id="cCompany" value="${esc(c?c.company||'':'')}" placeholder="例: 株式会社〇〇">
    <label>ステータス</label>
    <select id="cStatus">${CUST_STATUSES.map(s=>`<option${c&&c.status===s?' selected':''}>${s}</option>`).join('')}</select>
    <label>連絡先（メール・電話など）</label>
    <input type="text" id="cContact" value="${esc(c?c.contact||'':'')}" placeholder="例: taro@example.com">
    <label>関連事業</label>
    <select id="cBiz">${opts}</select>
    <label>メモ</label>
    <textarea id="cNote" placeholder="アプローチ内容、特記事項など">${esc(c?c.note||'':'')}</textarea>
    <div class="btn-row">
      <button class="btn" onclick="saveCustomer('${id||''}')">保存</button>
      <button class="btn sec" onclick="${id?`go('customer','${id}')`:"go('customers')"}">キャンセル</button>
    </div>
  </div>`;
}
function newCustomer()    { sel={type:'new-customer',id:null}; renderTree(); renderPanel(); }
function editCustomer(id) { sel={type:'edit-customer',id}; renderTree(); renderPanel(); }
function saveCustomer(id) {
  const name = document.getElementById('cName').value.trim();
  if(!name){alert('名前を入力してください');return;}
  const obj = {
    name, company:document.getElementById('cCompany').value.trim(),
    status:document.getElementById('cStatus').value,
    contact:document.getElementById('cContact').value.trim(),
    bizId:document.getElementById('cBiz').value,
    note:document.getElementById('cNote').value.trim()
  };
  let newId = id;
  if(id){Object.assign(data.customers.find(x=>x.id===id),obj);}
  else{newId=uid();data.customers.push({id:newId,...obj});}
  sel={type:'customer',id:newId}; persist();
}
function delCustomer(id) {
  if(!confirm('この顧客候補を削除しますか?'))return;
  data.customers = data.customers.filter(x=>x.id!==id);
  sel={type:'customers',id:null}; persist('削除しました');
}

// ── CSV Import ────────────────────────────────────────────
let csvRows = [], csvHeaders = [];

function showCsvModal() {
  const el = document.createElement('div');
  el.className = 'modal-bg'; el.id = 'csvModalBg';
  el.innerHTML = `
  <div class="modal">
    <h3>📥 CSVインポート（顧客候補）</h3>
    <p style="font-size:.83rem;color:var(--sub);margin-bottom:12px">Notion・Numbers からエクスポートした CSV ファイルを選択してください（UTF-8推奨）。</p>
    <input type="file" id="csvFile" accept=".csv" onchange="loadCsv(event)" style="margin-bottom:12px">
    <div id="csvMapArea" style="display:none">
      <p style="font-size:.8rem;color:var(--sub);margin-bottom:8px">プレビュー（1行目）:</p>
      <div class="csv-preview" id="csvPreview"></div>
      <p style="font-size:.82rem;font-weight:600;margin-bottom:8px">列を対応付け（不要な列は「使わない」）:</p>
      <div class="csv-grid" id="csvGrid"></div>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn" id="csvImportBtn" style="display:none" onclick="execCsvImport()">インポート実行</button>
      <button class="btn sec" onclick="document.getElementById('csvModalBg').remove()">キャンセル</button>
    </div>
  </div>`;
  document.body.appendChild(el);
}

function loadCsv(ev) {
  const file = ev.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    const text = e.target.result;
    csvRows = parseCsv(text);
    if(csvRows.length < 2){alert('データ行がありません');return;}
    csvHeaders = csvRows[0];
    const preview = csvRows[1] || [];
    document.getElementById('csvPreview').textContent = csvHeaders.map((h,i)=>`${h}: ${preview[i]||''}`).join('  |  ');
    const fields = [
      {key:'name',    label:'名前'},
      {key:'company', label:'会社名'},
      {key:'status',  label:'ステータス'},
      {key:'contact', label:'連絡先'},
      {key:'note',    label:'メモ'},
    ];
    const autoMap = h => {
      h = h.toLowerCase();
      if(/名前|name|氏名|顧客名/.test(h)) return 'name';
      if(/会社|company|organization|組織/.test(h)) return 'company';
      if(/ステータス|status|状態/.test(h)) return 'status';
      if(/連絡先|contact|email|メール|電話|phone/.test(h)) return 'contact';
      if(/メモ|note|備考|comment|説明/.test(h)) return 'note';
      return '';
    };
    const opts = `<option value="">使わない</option>`+fields.map(f=>`<option value="${f.key}">${f.label}</option>`).join('');
    document.getElementById('csvGrid').innerHTML = csvHeaders.map((h,i)=>`
      <div>
        <label>${esc(h)}</label>
        <select id="csvCol_${i}">${opts.replace(`value="${autoMap(h)}"`,`value="${autoMap(h)}" selected`)}</select>
      </div>`).join('');
    document.getElementById('csvMapArea').style.display = '';
    document.getElementById('csvImportBtn').style.display = '';
  };
  r.readAsText(file, 'UTF-8');
}

function parseCsv(text) {
  const rows = []; let row = [], cur = '', inQ = false;
  for(let i=0;i<text.length;i++){
    const ch=text[i],nx=text[i+1];
    if(inQ){if(ch==='"'&&nx==='"'){cur+='"';i++;}else if(ch==='"'){inQ=false;}else{cur+=ch;}}
    else if(ch==='"'){inQ=true;}
    else if(ch===','){row.push(cur);cur='';}
    else if(ch==='\r'||ch==='\n'){if(ch==='\r'&&nx==='\n')i++;row.push(cur);if(row.some(c=>c))rows.push(row);row=[];cur='';}
    else{cur+=ch;}
  }
  row.push(cur);if(row.some(c=>c))rows.push(row);
  return rows;
}

function execCsvImport() {
  const mapping = {};
  csvHeaders.forEach((_,i)=>{
    const v = document.getElementById('csvCol_'+i)?.value;
    if(v) mapping[i] = v;
  });
  if(!Object.values(mapping).includes('name')){alert('「名前」列を選択してください');return;}
  let count = 0;
  for(let ri=1;ri<csvRows.length;ri++){
    const row = csvRows[ri]; if(!row.length) continue;
    const obj = {id:uid(),name:'',company:'',status:'候補',contact:'',bizId:'',note:''};
    const extras = [];
    csvHeaders.forEach((_,i)=>{
      const val = (row[i]||'').trim(); if(!val) return;
      const field = mapping[i];
      if(field) obj[field] = val;
      else if(!mapping[i]) extras.push(val);
    });
    if(!obj.name) continue;
    if(!CUST_STATUSES.includes(obj.status)) obj.status = '候補';
    if(extras.length) obj.note = [obj.note, extras.join(' / ')].filter(Boolean).join('\n');
    data.customers.push(obj); count++;
  }
  document.getElementById('csvModalBg').remove();
  sel={type:'customers',id:null}; persist(`${count}件インポートしました`);
}

// ── Flow Map ──────────────────────────────────────────────
const FNODE_TYPES = [
  { key:'idea',     label:'アイデア', color:'#7c3aed', bg:'#ede9fe' },
  { key:'biz',      label:'事業',     color:'#1e5f8a', bg:'#dbeafe' },
  { key:'strategy', label:'戦略',     color:'#15803d', bg:'#dcfce7' },
  { key:'customer', label:'顧客',     color:'#b45309', bg:'#fef3c7' },
  { key:'issue',    label:'課題',     color:'#b91c1c', bg:'#fee2e2' },
  { key:'memo',     label:'メモ',     color:'#6b7280', bg:'#f3f4f6' },
];
const ftypeInfo = k => FNODE_TYPES.find(t=>t.key===k) || FNODE_TYPES[0];

let _fPan={x:40,y:40}, _fZoom=1, _fAddType='idea', _fSel=null;
let _fDragNode=null, _fDragPending=null, _fResize=null, _fEdgeSrc=null, _fCleanup=null;

function setFType(k) {
  _fAddType = k;
  document.querySelectorAll('.ftype-btn').forEach(b=>b.classList.toggle('fta', b.dataset.key===k));
}

function pFlowMap() {
  return `
  <div class="p-head">
    <span class="p-icon">🔀</span>
    <div><div class="p-title">フローマップ</div><div class="p-sub">ノードを配置・接続して自由にフローを構築</div></div>
  </div>
  <div class="ftype-row">
    ${FNODE_TYPES.map(t=>`<button class="ftype-btn${_fAddType===t.key?' fta':''}" data-key="${t.key}" style="color:${t.color};background:${t.bg}" onclick="setFType('${t.key}')">${t.label}</button>`).join('')}
  </div>
  <div class="flow-wrap" id="flowWrap">
    <div class="flow-toolbar">
      <button onclick="addFNode()">＋ ノード追加</button>
      <button onclick="autoLayoutF()">自動整列</button>
      <button onclick="resetFView()">表示リセット</button>
    </div>
    <div id="flowWorld" class="flow-world">
      <svg id="flowSvg" style="position:absolute;left:0;top:0;width:8000px;height:8000px;pointer-events:none;overflow:visible">
        <defs>
          <marker id="farrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 z" fill="#9ca3af"/>
          </marker>
        </defs>
        <g id="flowEdgesG" style="pointer-events:all"></g>
      </svg>
    </div>
  </div>`;
}

function nodeHtml(n) {
  const ti = ftypeInfo(n.type);
  const bodyHtml = esc(n.body||'').replace(/\n/g,'<br>');
  return `<div class="fnode${_fSel===n.id?' fsel':''}" id="fn-${n.id}"
    style="left:${n.x}px;top:${n.y}px;width:${n.w||160}px;min-height:${n.h||80}px"
    onmousedown="fNodeDown(event,'${n.id}')">
    <div class="fnode-head" style="background:${ti.color}">
      <input class="fnode-lbl" value="${esc(n.label)}"
        onchange="fLabelChange('${n.id}',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()">
      <div class="fport" onmousedown="fPortDown(event,'${n.id}')"></div>
      <span class="fnode-del" onmousedown="event.stopPropagation()" onclick="delFNode('${n.id}')">✕</span>
    </div>
    <div class="fnode-body" contenteditable="true" spellcheck="false"
      onmousedown="event.stopPropagation()"
      oninput="fBodyChange('${n.id}',this.innerText)">${bodyHtml}</div>
    <div class="fresize" onmousedown="fResizeDown(event,'${n.id}')">⤡</div>
  </div>`;
}

function renderFNodes() {
  const world = document.getElementById('flowWorld');
  if (!world) return;
  world.querySelectorAll('.fnode').forEach(el=>el.remove());
  for (const n of data.flowNodes) {
    const tmp = document.createElement('div');
    tmp.innerHTML = nodeHtml(n);
    world.appendChild(tmp.firstElementChild);
  }
}

function renderFEdges() {
  const g = document.getElementById('flowEdgesG');
  if (!g) return;
  let h = '';
  for (const e of data.flowEdges) {
    const src = data.flowNodes.find(n=>n.id===e.src);
    const tgt = data.flowNodes.find(n=>n.id===e.tgt);
    if (!src||!tgt) continue;
    const sx=src.x+(src.w||160), sy=src.y+(src.h||80)/2;
    const tx=tgt.x,              ty=tgt.y+(tgt.h||80)/2;
    h += `<path d="${fbez(sx,sy,tx,ty)}" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#farrow)" style="cursor:pointer" onclick="delFEdge('${e.id}')" title="クリックで削除"/>`;
  }
  g.innerHTML = h;
}

function fbez(sx,sy,tx,ty) {
  const dx = Math.abs(tx-sx)*0.5+40;
  return `M${sx},${sy} C${sx+dx},${sy} ${tx-dx},${ty} ${tx},${ty}`;
}

function wrapToWorld(cx, cy) {
  const wrap = document.getElementById('flowWrap');
  if (!wrap) return {x:0,y:0};
  const r = wrap.getBoundingClientRect();
  return { x:(cx-r.left-_fPan.x)/_fZoom, y:(cy-r.top-_fPan.y)/_fZoom };
}

function applyFTransform() {
  const w = document.getElementById('flowWorld');
  if (w) w.style.transform = `translate(${_fPan.x}px,${_fPan.y}px) scale(${_fZoom})`;
}

function initFlowMap() {
  if (_fCleanup) { _fCleanup(); _fCleanup=null; }
  const wrap = document.getElementById('flowWrap');
  if (!wrap) return;
  applyFTransform();
  renderFNodes();
  renderFEdges();

  let panDrag = null;
  const wDown = e => {
    const t = e.target;
    if (t!==wrap && t.id!=='flowWorld' && t.id!=='flowSvg') return;
    if (e.button!==0) return;
    panDrag = {sx:e.clientX,sy:e.clientY,px:_fPan.x,py:_fPan.y};
    wrap.style.cursor='grabbing';
    e.preventDefault();
  };
  const wMove = e => {
    if (!panDrag) return;
    _fPan.x = panDrag.px+(e.clientX-panDrag.sx);
    _fPan.y = panDrag.py+(e.clientY-panDrag.sy);
    applyFTransform();
  };
  const wUp = () => { if(panDrag){panDrag=null;wrap.style.cursor='';} };
  const onWheel = e => {
    e.preventDefault();
    const r=wrap.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const dz=e.deltaY<0?1.1:0.909;
    const nz=Math.min(3,Math.max(0.15,_fZoom*dz));
    _fPan.x=mx-(mx-_fPan.x)*(nz/_fZoom);
    _fPan.y=my-(my-_fPan.y)*(nz/_fZoom);
    _fZoom=nz; applyFTransform();
  };
  const onMove = e=>fOnMove(e);
  const onUp   = e=>fOnUp(e);

  wrap.addEventListener('mousedown', wDown);
  document.addEventListener('mousemove', wMove);
  document.addEventListener('mouseup', wUp);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  wrap.addEventListener('wheel', onWheel, {passive:false});

  _fCleanup = () => {
    wrap.removeEventListener('mousedown', wDown);
    document.removeEventListener('mousemove', wMove);
    document.removeEventListener('mouseup', wUp);
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    wrap.removeEventListener('wheel', onWheel);
  };
}

function fNodeDown(e, nid) {
  if (e.button!==0) return;
  _fSel=nid;
  document.querySelectorAll('.fnode').forEach(el=>el.classList.remove('fsel'));
  const el=document.getElementById('fn-'+nid);
  if (el) el.classList.add('fsel');
  if (e.target.closest('.fport')||e.target.closest('.fnode-del')||e.target.closest('.fresize')) return;
  if (!e.target.closest('.fnode-head')) return;
  const n=data.flowNodes.find(n=>n.id===nid);
  if (!n) return;
  if (e.target.tagName==='INPUT') {
    // inputクリック: 閾値を超えたらドラッグ開始（クリックでフォーカスも維持）
    _fDragPending={nid,startX:e.clientX,startY:e.clientY};
  } else {
    // ヘッダー背景: 即座にドラッグ開始
    const wp=wrapToWorld(e.clientX,e.clientY);
    _fDragNode={nid,ox:wp.x-n.x,oy:wp.y-n.y};
    e.preventDefault();
  }
}

function fPortDown(e, nid) {
  e.stopPropagation(); e.preventDefault();
  const n=data.flowNodes.find(n=>n.id===nid);
  if (!n) return;
  _fEdgeSrc={nid,px:n.x+(n.w||160),py:n.y+(n.h||80)/2};
}

function fResizeDown(e, nid) {
  e.stopPropagation(); e.preventDefault();
  _fResize={nid};
}

function fOnMove(e) {
  if (_fDragPending) {
    const dx=e.clientX-_fDragPending.startX, dy=e.clientY-_fDragPending.startY;
    if (Math.sqrt(dx*dx+dy*dy)>5) {
      const n=data.flowNodes.find(n=>n.id===_fDragPending.nid);
      if (n) {
        const wp=wrapToWorld(e.clientX,e.clientY);
        _fDragNode={nid:_fDragPending.nid,ox:wp.x-n.x,oy:wp.y-n.y};
      }
      _fDragPending=null;
      document.getSelection()?.removeAllRanges();
    }
  }
  if (_fDragNode) {
    const wp=wrapToWorld(e.clientX,e.clientY);
    const n=data.flowNodes.find(n=>n.id===_fDragNode.nid);
    if (n) {
      n.x=Math.round(wp.x-_fDragNode.ox); n.y=Math.round(wp.y-_fDragNode.oy);
      const el=document.getElementById('fn-'+n.id);
      if (el) { el.style.left=n.x+'px'; el.style.top=n.y+'px'; }
      renderFEdges();
    }
  }
  if (_fResize) {
    const wp=wrapToWorld(e.clientX,e.clientY);
    const n=data.flowNodes.find(n=>n.id===_fResize.nid);
    if (n) {
      n.w=Math.max(120,Math.round(wp.x-n.x)); n.h=Math.max(60,Math.round(wp.y-n.y));
      const el=document.getElementById('fn-'+n.id);
      if (el) { el.style.width=n.w+'px'; el.style.minHeight=n.h+'px'; }
    }
  }
  if (_fEdgeSrc) {
    const wp=wrapToWorld(e.clientX,e.clientY);
    let tmp=document.getElementById('fTmpLine');
    if (!tmp) {
      tmp=document.createElementNS('http://www.w3.org/2000/svg','path');
      tmp.id='fTmpLine'; tmp.setAttribute('stroke','#9ca3af');
      tmp.setAttribute('stroke-width','2'); tmp.setAttribute('stroke-dasharray','6,3');
      tmp.setAttribute('fill','none');
      const svg=document.getElementById('flowSvg');
      if (svg) svg.appendChild(tmp);
    }
    tmp.setAttribute('d', fbez(_fEdgeSrc.px,_fEdgeSrc.py,wp.x,wp.y));
  }
}

function fOnUp(e) {
  if (_fDragPending) { _fDragPending=null; }
  if (_fDragNode) {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    _fDragNode=null;
  }
  if (_fResize) {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    _fResize=null;
  }
  if (_fEdgeSrc) {
    const tmp=document.getElementById('fTmpLine');
    if (tmp) tmp.remove();
    const tgt=e.target.closest && e.target.closest('.fnode');
    if (tgt) {
      const tgtId=tgt.id.replace('fn-','');
      if (tgtId && tgtId!==_fEdgeSrc.nid && !data.flowEdges.find(ed=>ed.src===_fEdgeSrc.nid&&ed.tgt===tgtId)) {
        data.flowEdges.push({id:uid(),src:_fEdgeSrc.nid,tgt:tgtId});
        localStorage.setItem(STORE_KEY, JSON.stringify(data));
        renderFEdges(); renderTree();
      }
    }
    _fEdgeSrc=null;
  }
}

function fLabelChange(nid, val) {
  const n=data.flowNodes.find(n=>n.id===nid);
  if (n) { n.label=val.trim()||n.label; localStorage.setItem(STORE_KEY,JSON.stringify(data)); }
}
function fBodyChange(nid, val) {
  const n=data.flowNodes.find(n=>n.id===nid);
  if (n) { n.body=val; localStorage.setItem(STORE_KEY,JSON.stringify(data)); }
}

function addFNode() {
  const idx=data.flowNodes.length;
  const n={id:uid(),type:_fAddType,label:ftypeInfo(_fAddType).label,body:'',x:60+idx*30,y:60+idx*30,w:160,h:80};
  data.flowNodes.push(n);
  persist('ノードを追加しました');
}
function delFNode(nid) {
  data.flowNodes=data.flowNodes.filter(n=>n.id!==nid);
  data.flowEdges=data.flowEdges.filter(e=>e.src!==nid&&e.tgt!==nid);
  persist('ノードを削除しました');
}
function delFEdge(eid) {
  data.flowEdges=data.flowEdges.filter(e=>e.id!==eid);
  localStorage.setItem(STORE_KEY,JSON.stringify(data));
  renderFEdges();
}
function resetFView() { _fPan={x:40,y:40}; _fZoom=1; applyFTransform(); }
function autoLayoutF() {
  if (!data.flowNodes.length) return;
  const cols=Math.ceil(Math.sqrt(data.flowNodes.length));
  data.flowNodes.forEach((n,i)=>{ n.x=60+(i%cols)*200; n.y=60+Math.floor(i/cols)*150; });
  _fPan={x:40,y:40}; _fZoom=1;
  localStorage.setItem(STORE_KEY,JSON.stringify(data));
  applyFTransform();
  data.flowNodes.forEach(n=>{
    const el=document.getElementById('fn-'+n.id);
    if(el){ el.style.left=n.x+'px'; el.style.top=n.y+'px'; }
  });
  renderFEdges();
  const t=document.getElementById('toast');
  t.textContent='自動整列しました'; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// ── Export / Import ───────────────────────────────────────
function exportData(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download='LIMS-backup-'+today()+'.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importData(ev){
  const file=ev.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const imp=JSON.parse(r.result);
      if(!imp.philosophy&&!imp.businesses) throw new Error('形式が違います');
      if(!confirm('現在のデータを上書きします。よろしいですか?')) return;
      data=Object.assign({philosophy:{mission:'',vision:'',values:[],story:''},businesses:[],strategies:[],notes:[],customers:[],flowNodes:[],flowEdges:[]},imp);
      sel={type:'dashboard',id:null}; persist('インポートしました');
    }catch(e){alert('読み込みに失敗しました: '+e.message);}
    ev.target.value='';
  };
  r.readAsText(file);
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

// ── Init ──────────────────────────────────────────────────
load(); renderTree(); renderPanel();
